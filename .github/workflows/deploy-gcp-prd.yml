name: Deploy to Cloud Run

on:
  push:
    branches:
      - main  # Altere para a branch que você deseja usar para deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v2

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v1
      with:
        credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

    - name: Set up Google Cloud SDK
      run: gcloud config set project ${{ secrets.GCP_PROJECT_ID }}

    # Credenciais do Firebase/Firestore (projeto coployf) - separado do deploy GCP
    - name: Create Firebase credentials
      env:
        FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
      run: |
        echo "$FIREBASE_CREDENTIALS" > firebase.json
        cp firebase.json firebase-hml.json

    - name: Build Docker image
      run: |
        docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/coploy-gupy-odontoprev .

    - name: Push Docker image to Google Container Registry
      run: |
        gcloud auth configure-docker
        docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/coploy-gupy-odontoprev

    - name: Deploy to Cloud Run
      run: |
        gcloud run deploy coploy-gupy-odontoprev \
          --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/coploy-gupy-odontoprev \
          --platform managed \
          --region southamerica-east1 \
          --quiet
